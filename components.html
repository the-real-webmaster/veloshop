<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компоненты</title>

    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    
    <div class="container">
        <a href="#" class="default-link">Ссылка</a>
        <button class="default-btn">Отправить</button>
        <input type="text" placeholder="Подсказка" class="text-field">
        <h2 class="subtitle">Подзагаловок</h2>
        <img src="./img/logo.svg" width="154" alt="ВелоSHOP">

        <nav class="menu">
            <ul class="menu__list">
                <li class="menu__item">
                    <a href="" class="menu__link">Каталог</a>
                </li>
                <li class="menu__item">
                    <a href="" class="menu__link">Новинки</a>
                </li>
                <li class="menu__item">
                    <a href="" class="menu__link">Заказать</a>
                </li>
                <li class="menu__item">
                    <a href="" class="menu__link">Контакты</a>
                </li>
            </ul>
        </nav>

        <form action="" class="callback-form">
            <input type="tel" name="user-tel" placeholder="Телефон" class="text-field callback-form__input">
            <button type="submit" class="default-btn callback-form__btn">Отправить</button>
        </form>

        <article class="product-card">
            <img src="./img/4.jpg" alt="" class="product-card__img">

            <div class="product-card__body">
                <div class="product-card__body-top">
                    <h3 class="product-card__title">Велосипед BMX Tech Team Goof 20</h3>
                    <strong class="product-card__price">12 830 руб</strong>
                </div>

                <button type="submit" class="default-btn product-card__btn">Купить</button>
            </div>
        </article>

        <article class="product-card product-card--big">
            <img src="./img/6.jpg" alt="" class="product-card__img product-card__img--big">

            <div class="product-card__body product-card__body--big">
                <div class="product-card__body-top">
                    <h3 class="product-card__title product-card__title--big">Велосипед BMX Tech Team Goof 20</h3>
                    <strong class="product-card__price product-card__price--big">12 830 руб</strong>
                </div>

                <button type="submit" class="default-btn product-card__btn product-card__btn--big">Купить</button>
            </div>
        </article>
    </div>

</body>
</html>
